name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Triage issue with Claude
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repositorio (obtén su contenido con `gh issue view ${{ github.event.issue.number }}`).

            Tu tarea tiene dos partes:

            1. Labels:
               - Revisa los labels existentes del repositorio con `gh label list`.
               - Elige los labels que correspondan al issue (por ejemplo bug, enhancement, documentation, question, duplicate, invalid, help wanted, good first issue, wontfix).
               - Aplícalos con `gh issue edit ${{ github.event.issue.number }} --add-label "..."`.
               - No crees labels nuevos; usa únicamente los que ya existen en el repositorio.

            2. Diagnóstico general:
               - Publica un comentario en el issue con `gh issue comment ${{ github.event.issue.number }} --body "..."` que contenga un "Diagnóstico general" preliminar con esta estructura:
                 - Resumen del problema
                 - Área o archivo probablemente afectado (este proyecto es un Tetris en JS/HTML/CSS puro: `game.js` contiene toda la lógica del juego, `index.html` la estructura DOM, `style.css` el estilo)
                 - Hipótesis de causa raíz
                 - Nivel de severidad/complejidad estimado
               - Deja explícito en el comentario que este es un diagnóstico preliminar y que servirá de base para un análisis técnico más detallado antes de implementar la solución.
               - No implementes ningún cambio de código ni abras un PR; solo analiza, etiqueta y comenta.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*)"'
